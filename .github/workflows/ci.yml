name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Build Docker Image
        run: docker build -t calculator .

      - name: Run tests inside the Image
        run: docker run --rm calculator bundle exec rspec

