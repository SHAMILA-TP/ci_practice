name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      RAILS_ENV: test
      API_KEY: ${{ secrets.MY_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Build Docker Image
        run: docker build -t calculator .

      - name: Create reports folder
        run: mkdir -p reports

      - name: Run tests inside the Image
        # run: docker run --rm -v $(pwd)/reports:/app/reports calculator bundle exec rspec --format documentation --out /app/reports/results.txt
        # run: docker run --rm -e RAILS_ENV=$RAILS_ENV -v $(pwd)/reports:/app/reports calculator bundle exec rspec --format documentation --out /app/reports/results.txt
          run: docker run --rm -e RAILS_ENV=$RAILS_ENV -e API_KEY=$API_KEY -v $(pwd)/reports:/app/reports calculator bundle exec rspec --format documentation --out /app/reports/results.txt
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: rspec-results
          path: reports/results.txt

      - name: Print api API_KEY
        run: echo "my api key is $API_KEY"

